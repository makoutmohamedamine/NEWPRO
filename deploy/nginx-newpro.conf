# Remplacer VOTRE_DOMAINE par votre nom de domaine ou l'IP du serveur.
# Copier vers: /etc/nginx/sites-available/newpro
# Puis: sudo ln -s /etc/nginx/sites-available/newpro /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

upstream newpro_backend {
    server unix:/run/newpro/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    client_max_body_size 25M;

    root /var/www/newpro/frontend/build;
    index index.html;

    location /api/ {
        proxy_pass http://newpro_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://newpro_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /var/www/newpro/backend/media/;
    }

    location /static/ {
        alias /var/www/newpro/backend/staticfiles/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
